<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Add Student</title>
    <style layout:fragment="extra-styles">
        .simple-card {
            max-width: 620px;
            background: #fff;
            border-radius: 16px;
            padding: 1.3rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 3px 12px rgba(79, 70, 229, 0.08);
        }
        .f-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .f-input {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: #f8fafc;
            font-size: 0.9rem;
        }
        .f-input:focus { outline: none; border-color: #6366f1; background: #fff; }
        .f-input.is-invalid { border-color: #f43f5e; }
        .err { color: #f43f5e; font-size: 0.78rem; margin: -4px 0 8px; font-weight: 700; }
        .btn-save {
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: #fff;
            padding: 10px 16px;
            font-size: 0.86rem;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>
<th:block layout:fragment="page-icon">🎓</th:block>
<th:block layout:fragment="page-title">Add Student</th:block>
<th:block layout:fragment="content">
    <div class="simple-card">
        <div th:if="${errorMessage}" class="flash-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}">Error</span>
        </div>
        <form th:action="@{/students/add}" th:object="${studentForm}" method="post">
            <label class="f-label" for="name">Student Name</label>
            <input id="name" class="f-input" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"/>
            <div class="err" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

            <label class="f-label" for="email">Email</label>
            <input id="email" type="email" class="f-input" th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"/>
            <div class="err" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

            <label class="f-label" for="password">Password</label>
            <input id="password" type="password" class="f-input" th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"/>
            <div class="err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

            <button type="submit" class="btn-save">Save Student</button>
        </form>
    </div>
</th:block>
</body>
</html>
