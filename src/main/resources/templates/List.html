<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Book Record</title>
    <style layout:fragment="extra-styles">
        :root {
            --indigo: #4f46e5; --violet: #7c3aed;
            --cyan: #06b6d4;   --emerald: #10b981;
            --amber: #f59e0b;  --rose: #f43f5e;
        }

        /* ── STAT CARDS ───────────────────────────── */
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 1.75rem; }

        .stat-c {
            border-radius: 18px;
            padding: 1.25rem 1.4rem;
            display: flex; align-items: center; gap: 14px;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .stat-c::after {
            content: attr(data-emoji);
            position: absolute; right: 14px; bottom: 8px;
            font-size: 2.8rem; opacity: 0.18;
            pointer-events: none;
        }

        .stat-c.s-blue  { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .stat-c.s-teal  { background: linear-gradient(135deg, #0d9488, #06b6d4); }
        .stat-c.s-amber { background: linear-gradient(135deg, #d97706, #f59e0b); }

        .stat-icon-box {
            width: 46px; height: 46px;
            border-radius: 14px;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; flex-shrink: 0;
        }
        .stat-val {
            font-family: 'Sora', sans-serif;
            font-size: 1.8rem; font-weight: 700;
            color: #fff; line-height: 1;
        }
        .stat-lbl { color: rgba(255,255,255,0.75); font-size: 0.78rem; font-weight: 700; margin-top: 3px; }

        /* ── TABLE CARD ───────────────────────────── */
        .tbl-card {
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(79,70,229,0.07);
            border: 1px solid rgba(79,70,229,0.06);
        }

        .tbl-head {
            padding: 1.1rem 1.5rem;
            display: flex; align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
            background: linear-gradient(135deg, #fafbff, #f5f3ff);
        }

        .tbl-head h5 {
            font-family: 'Sora', sans-serif;
            font-size: 1rem; font-weight: 700;
            color: #1e1b4b; margin: 0;
            display: flex; align-items: center; gap: 8px;
        }

        /* Search */
        .search-wrap { position: relative; }
        .search-wrap i {
            position: absolute; left: 11px; top: 50%;
            transform: translateY(-50%);
            color: #94a3b8; font-size: 0.9rem; pointer-events: none;
        }
        .search-inp {
            padding: 8px 14px 8px 34px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem; color: #1e293b;
            width: 210px;
            transition: all 0.2s; background: #fff;
        }
        .search-inp:focus { outline: none; border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

        .btn-add-book {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            background: linear-gradient(135deg, var(--indigo), var(--violet));
            border: none; border-radius: 10px;
            color: #fff; font-family: 'Nunito', sans-serif;
            font-size: 0.85rem; font-weight: 800;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 3px 12px rgba(79,70,229,0.3);
        }
        .btn-add-book:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(79,70,229,0.4); color:#fff; }

        /* Table */
        .books-tbl { width: 100%; border-collapse: collapse; }

        .books-tbl thead th {
            background: #f8fafc;
            padding: 11px 16px;
            font-size: 0.7rem; font-weight: 800;
            letter-spacing: 1.2px; text-transform: uppercase;
            color: #94a3b8;
            border-bottom: 2px solid #f1f5f9;
            white-space: nowrap;
        }

        .books-tbl tbody tr {
            border-bottom: 1px solid #f8fafc;
            transition: background 0.15s;
        }
        .books-tbl tbody tr:hover { background: #f8f7ff; }
        .books-tbl tbody tr:last-child { border: none; }

        .books-tbl td {
            padding: 13px 16px;
            font-size: 0.875rem; color: #334155;
            vertical-align: middle;
        }

        /* Row number */
        .row-num {
            width: 28px; height: 28px;
            border-radius: 8px;
            background: #f1f5f9;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 800; color: #94a3b8;
        }

        /* Book title cell */
        .book-name { font-weight: 700; color: #1e1b4b; font-size: 0.9rem; }
        .book-author { color: #94a3b8; font-size: 0.78rem; margin-top: 2px; }

        /* Branch pill */
        .branch-pill {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem; font-weight: 800;
        }
        .branch-pill.BSIT  { background: #eff6ff; color: #1d4ed8; }
        .branch-pill.BSCS  { background: #f0fdf4; color: #166534; }
        .branch-pill.BSSE  { background: #fff7ed; color: #9a3412; }
        .branch-pill.Other { background: #f5f3ff; color: #5b21b6; }

        /* Category pill */
        .cat-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem; font-weight: 700;
            background: #f1f5f9; color: #475569;
        }

        /* Availability bar */
        .avail-bar {
            display: flex; align-items: center; gap: 8px; min-width: 110px;
        }
        .bar-track {
            flex: 1; height: 7px;
            background: #e2e8f0; border-radius: 10px; overflow: hidden;
        }
        .bar-fill {
            height: 100%; border-radius: 10px;
            background: linear-gradient(90deg, var(--emerald), var(--cyan));
            transition: width 0.4s ease;
        }
        .bar-fill.low { background: linear-gradient(90deg, var(--rose), var(--amber)); }
        .avail-num { font-size: 0.8rem; font-weight: 700; color: #334155; white-space: nowrap; }

        /* View btn */
        .btn-view {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 14px;
            background: linear-gradient(135deg, var(--indigo), var(--violet));
            border-radius: 8px; color: #fff;
            font-size: 0.78rem; font-weight: 800;
            text-decoration: none; border: none;
            transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        .btn-view:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.35); color:#fff; }

        /* Empty state */
        .empty-st {
            text-align: center; padding: 4rem 2rem;
            color: #94a3b8;
        }
        .empty-st .big-emoji { font-size: 3.5rem; margin-bottom: 1rem; display:block; }
        .empty-st p { font-size: 0.9rem; }
        .empty-st a { color: var(--indigo); font-weight: 700; }
    </style>
</head>
<body>

<th:block layout:fragment="page-icon">📚</th:block>
<th:block layout:fragment="page-title">Book Record</th:block>

<div layout:fragment="content">
    <th:block th:with="activePage='book-record'"></th:block>

    <!-- Flash -->
    <div th:if="${successMessage}" class="flash-success">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMessage}"></span>
    </div>

    <!-- STATS ROW -->
    <div class="stats-row">
        <div class="stat-c s-blue" data-emoji="📚">
            <div class="stat-icon-box">📚</div>
            <div>
                <div class="stat-val" th:text="${#lists.size(books)}">0</div>
                <div class="stat-lbl">Total Titles</div>
            </div>
        </div>
        <div class="stat-c s-teal" data-emoji="✅">
            <div class="stat-icon-box">✅</div>
            <div>
                <div class="stat-val"
                     th:text="${books.stream().mapToInt(b -> b.availableCopies != null ? b.availableCopies : 0).sum()}">0</div>
                <div class="stat-lbl">Available Copies</div>
            </div>
        </div>
        <div class="stat-c s-amber" data-emoji="📤">
            <div class="stat-icon-box">📤</div>
            <div>
                <div class="stat-val"
                     th:text="${books.stream().mapToInt(b -> b.rentedCount).sum()}">0</div>
                <div class="stat-lbl">Currently Issued</div>
            </div>
        </div>
    </div>

    <!-- TABLE CARD -->
    <div class="tbl-card">
        <div class="tbl-head">
            <h5><span>📋</span> All Books</h5>
            <div class="d-flex align-items-center gap-2">
                <form method="get" action="/books" style="margin:0">
                    <div class="search-wrap">
                        <i class="bi bi-search"></i>
                        <input type="text" name="keyword" class="search-inp"
                               placeholder="Search title or author..." th:value="${keyword}">
                    </div>
                </form>
                <a href="/books/add" class="btn-add-book">
                    <i class="bi bi-plus-lg"></i> Add Book
                </a>
            </div>
        </div>

        <table class="books-tbl">
            <thead>
            <tr>
                <th>#</th>
                <th>Book</th>
                <th>Category</th>
                <th>Branch</th>
                <th>Price</th>
                <th>Availability</th>
                <th>Issued</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <!-- Empty state -->
            <tr th:if="${#lists.isEmpty(books)}">
                <td colspan="8">
                    <div class="empty-st">
                        <span class="big-emoji">📭</span>
                        <p>No books found. <a href="/books/add">Add your first book →</a></p>
                    </div>
                </td>
            </tr>

            <!-- Book rows -->
            <tr th:each="book, s : ${books}">
                <td>
                    <div class="row-num" th:text="${s.count}">1</div>
                </td>
                <td>
                    <div class="book-name" th:text="${book.title}">Title</div>
                    <div class="book-author" th:text="${book.author}">Author</div>
                </td>
                <td>
                    <span class="cat-pill" th:text="${book.category ?: 'N/A'}"></span>
                </td>
                <td>
                        <span class="branch-pill"
                              th:classappend="${book.branch}"
                              th:text="${book.branch ?: 'N/A'}"></span>
                </td>
                <td style="font-weight:700; color:#1e1b4b;"
                    th:text="${'$' + #numbers.formatDecimal(book.price != null ? book.price : 0, 1, 2)}">
                </td>
                <td>
                    <div class="avail-bar">
                        <div class="bar-track">
                            <div class="bar-fill"
                                 th:classappend="${(book.totalCopies != null and book.totalCopies > 0) and ((book.availableCopies * 100 / book.totalCopies) < 25)} ? ' low'"
                                 th:style="${'width:' + (book.totalCopies != null and book.totalCopies > 0 ? (book.availableCopies * 100 / book.totalCopies) : 0) + '%'}">
                            </div>
                        </div>
                        <span class="avail-num"
                              th:text="${(book.availableCopies ?: 0) + '/' + (book.totalCopies ?: 0)}">
                            </span>
                    </div>
                </td>
                <td>
                        <span th:text="${book.rentedCount}"
                              th:style="${book.rentedCount > 0} ? 'color:#f59e0b; font-weight:800;' : 'color:#94a3b8; font-weight:600;'">
                        </span>
                </td>
                <td>
                    <a th:href="@{/books/view/{id}(id=${book.id})}" class="btn-view">
                        <i class="bi bi-eye-fill"></i> View
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
